<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 - INTERCONNECT</title>
        <!-- Design System CSS -->
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="design-system-effects.css">
    <link rel="stylesheet" href="design-system-integration.css">
    
    <!-- Legacy CSS (will be gradually replaced) -->
<link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="loading.css">
    <link rel="stylesheet" href="dark-mode.css">
    <link rel="stylesheet" href="responsive-improvements.css">
    <link rel="stylesheet" href="unified-colors.css">
    <link rel="stylesheet" href="logo-blue-update.css">
        <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="accessibility-improvements.css">
    <!-- Legacy JS -->
<script src="security-utils.js"></script>
    <script src="error-handler.js"></script>
    <script src="notification-manager.js"></script>
    <script src="performance-utils.js"></script>
    <script src="security-manager.js"></script>
    <link rel="stylesheet" href="responsive-design-fix.css">
    <link rel="stylesheet" href="button-section-optimization.css">
    <link rel="stylesheet" href="button-mobile-enhance.css">
    <script src="fix-csp-errors.js"></script>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo-link">
                <h1>INTERCONNECT</h1>
                <span class="tagline">経営者コミュニティ</span>
            </a>
        </div>
        
        <div class="auth-card register-card">
            <h2>新規登録</h2>
            <p class="auth-description">ビジネスの成長を加速させましょう</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">お名前 <span class="required">*</span></label>
                        <input type="text" id="name" name="name" placeholder="山田 太郎" required>
                    </div>
                    <div class="form-group">
                        <label for="email">メールアドレス <span class="required">*</span></label>
                        <input type="email" id="email" name="email" placeholder="example@company.com" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">パスワード <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="password" name="password" placeholder="8文字以上" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">パスワード（確認） <span class="required">*</span></label>
                        <div class="password-input-wrapper">
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="パスワードを再入力" required>
                            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="companyName">会社名 <span class="required">*</span></label>
                        <input type="text" id="companyName" name="companyName" placeholder="株式会社〇〇" required>
                    </div>
                    <div class="form-group">
                        <label for="position">役職 <span class="required">*</span></label>
                        <input type="text" id="position" name="position" placeholder="代表取締役" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phone">電話番号</label>
                        <input type="tel" id="phone" name="phone" placeholder="03-1234-5678">
                    </div>
                    <div class="form-group">
                        <label for="industry">業界 <span class="required">*</span></label>
                        <select id="industry" name="industry" required>
                            <option value="">選択してください</option>
                            <option value="it">IT・テクノロジー</option>
                            <option value="manufacturing">製造業</option>
                            <option value="retail">小売・流通</option>
                            <option value="finance">金融・保険</option>
                            <option value="healthcare">医療・ヘルスケア</option>
                            <option value="realestate">不動産・建設</option>
                            <option value="education">教育・人材</option>
                            <option value="consulting">コンサルティング</option>
                            <option value="food">飲食・フード</option>
                            <option value="logistics">物流・運輸</option>
                            <option value="media">メディア・広告</option>
                            <option value="other">その他</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="annualRevenue">年商 <span class="required">*</span></label>
                        <select id="annualRevenue" name="annualRevenue" required>
                            <option value="">選択してください</option>
                            <option value="under-10m">1000万円未満</option>
                            <option value="10m-50m">1000万円〜5000万円</option>
                            <option value="50m-100m">5000万円〜1億円</option>
                            <option value="100m-500m">1億円〜5億円</option>
                            <option value="500m-1b">5億円〜10億円</option>
                            <option value="over-1b">10億円以上</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="investmentBudget">投資予算 <span class="required">*</span></label>
                        <select id="investmentBudget" name="investmentBudget" required>
                            <option value="">選択してください</option>
                            <option value="under-1m">100万円未満</option>
                            <option value="1m-5m">100万円〜500万円</option>
                            <option value="5m-10m">500万円〜1000万円</option>
                            <option value="10m-50m">1000万円〜5000万円</option>
                            <option value="over-50m">5000万円以上</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="businessChallenges">事業課題・ニーズ <span class="required">*</span></label>
                    <textarea id="businessChallenges" name="businessChallenges" rows="4" 
                        placeholder="現在抱えている事業課題や、解決したいニーズを150文字以上で詳しくお聞かせください。" 
                        required minlength="150"></textarea>
                    <div class="char-counter">
                        <span id="charCount">0</span> / 150文字以上
                    </div>
                </div>
                
                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="terms" name="terms" required>
                        <span class="checkmark"></span>
                        <a href="terms.html" target="_blank">利用規約</a>と<a href="privacy.html" target="_blank">プライバシーポリシー</a>に同意します
                    </label>
                </div>
                
                <button type="submit" class="auth-button">アカウントを作成</button>
            </form>
            
            <div class="auth-divider">
                <span>または</span>
            </div>
            
            <div class="social-login">
                <button class="social-btn google-btn" onclick="registerWithGoogle()">
                    <i class="fab fa-google"></i>
                    Googleで登録
                </button>
                <button class="social-btn linkedin-btn" onclick="registerWithLinkedIn()">
                    <i class="fab fa-linkedin"></i>
                    LinkedInで登録
                </button>
                <button class="social-btn line-btn" onclick="registerWithLINE()">
                    <i class="fab fa-line"></i>
                    LINEで登録
                </button>
            </div>
            
            <div class="auth-footer">
                <p>すでにアカウントをお持ちの方は <a href="login.html">ログイン</a></p>
            </div>
        </div>
    </div>
    
    <script src="common.js"></script>
    <script src="security.js"></script>
    <script src="social-auth.js"></script>
    <script src="form-validation.js"></script>
    <script src="auth.js"></script>
    <script>
        // ページ固有の初期化処理
        document.addEventListener('DOMContentLoaded', function() {
            // 文字数カウンター
            const challengesTextarea = document.getElementById('businessChallenges');
            const charCount = document.getElementById('charCount');
            
            if (challengesTextarea && charCount) {
                challengesTextarea.addEventListener('input', function() {
                    const count = this.value.length;
                    charCount.textContent = count;
                    
                    if (count >= 150) {
                        charCount.parentElement.style.color = '#28a745';
                    } else {
                        charCount.parentElement.style.color = '#dc3545';
                    }
                });
            }
        });
    </script>
    <script src="auth-logout-fix.js"></script>
    <script src="design-system.js"></script>
</body>
</html>
