<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オフライン - INTERCONNECT</title>
    <!-- Design System CSS -->
    <link rel="stylesheet" href="design-system.css">
    <link rel="stylesheet" href="design-system-effects.css">
    <link rel="stylesheet" href="design-system-integration.css">
    
    <!-- Legacy CSS (will be gradually replaced) -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: #f5f7fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .offline-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .offline-icon {
            font-size: 5rem;
            color: #e0e0e0;
            margin-bottom: 2rem;
        }
        
        h1 {
            color: #1a73e8;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        
        p {
            color: #5f6368;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        
        .offline-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        button {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        button:hover {
            background: #1557b0;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }
        
        .secondary-button {
            background: #f1f3f4;
            color: #5f6368;
        }
        
        .secondary-button:hover {
            background: #e8eaed;
        }
        
        .offline-tips {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #e0e0e0;
        }
        
        .offline-tips h2 {
            color: #5f6368;
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        
        .offline-tips ul {
            list-style: none;
            text-align: left;
        }
        
        .offline-tips li {
            color: #5f6368;
            padding: 0.5rem 0;
            padding-left: 1.5rem;
            position: relative;
        }
        
        .offline-tips li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #34a853;
        }
        
        @media (max-width: 480px) {
            .offline-container {
                padding: 2rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .offline-actions {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
    </style>
    <!-- Legacy JS -->
<script src="fix-csp-errors.js"></script>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">
            <svg width="120" height="120" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" fill="#e0e0e0"/>
                <line x1="3" y1="21" x2="21" y2="3" stroke="#e0e0e0" stroke-width="2"/>
            </svg>
        </div>
        
        <h1>インターネットに接続されていません</h1>
        <p>
            ネットワーク接続を確認してください。<br>
            接続が回復したら、自動的にページが更新されます。
        </p>
        
        <div class="offline-actions">
            <button onclick="window.location.reload()">
                再読み込み
            </button>
            <button class="btn btn-secondary" onclick="history.back()">
                前のページに戻る
            </button>
        </div>
        
        <div class="offline-tips">
            <h2>オフライン時でも利用可能な機能</h2>
            <ul>
                <li>キャッシュされたページの閲覧</li>
                <li>以前に表示したプロフィール情報</li>
                <li>ダウンロード済みのドキュメント</li>
                <li>保存されたメッセージの下書き</li>
            </ul>
        </div>
    </div>
    
    <script>
        // オンライン復帰時の自動リロード
        window.addEventListener('online', () => {
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
        
        // 定期的な接続チェック
        setInterval(() => {
            fetch('/ping', { method: 'HEAD' })
                .then(() => {
                    window.location.reload();
                })
                .catch(() => {
                    // Still offline
                });
        }, 5000);
    </script>
    <script src="design-system.js"></script>
</body>
</html>
