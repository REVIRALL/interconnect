<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログインリンクテスト</title>
</head>
<body>
    <h1>ログインリンクテスト</h1>
    <p>以下のリンクをクリックしてlogin.htmlにアクセスできるか確認してください：</p>
    <ul>
        <li><a href="login.html">通常のリンク: login.html</a></li>
        <li><a href="./login.html">相対パス: ./login.html</a></li>
        <li><a href="/login.html">絶対パス: /login.html</a></li>
    </ul>
    <p>現在のURL: <span id="current-url"></span></p>
    <script>
        document.getElementById('current-url').textContent = window.location.href;
    </script>
</body>
</html>
