<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新しいパスワードを設定 - INTERCONNECT</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="security-manager.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-form-wrapper">
                <div class="auth-header">
                    <h1>新しいパスワードを設定</h1>
                    <p>安全なパスワードを設定してください</p>
                </div>

                <form class="auth-form" id="resetPasswordForm">
                    <div class="form-group">
                        <label for="newPassword">新しいパスワード</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="newPassword" name="newPassword" placeholder="新しいパスワード" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('newPassword')"></i>
                        </div>
                        <div class="password-strength" id="passwordStrength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span class="strength-text" id="strengthText">パスワード強度</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">パスワード確認</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="パスワードを再入力" required>
                            <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('confirmPassword')"></i>
                        </div>
                        <span class="error-message" id="confirmError"></span>
                    </div>

                    <div class="password-requirements">
                        <h4>パスワード要件：</h4>
                        <ul>
                            <li id="req-length">
                                <i class="fas fa-circle"></i>
                                8文字以上
                            </li>
                            <li id="req-uppercase">
                                <i class="fas fa-circle"></i>
                                大文字を含む
                            </li>
                            <li id="req-lowercase">
                                <i class="fas fa-circle"></i>
                                小文字を含む
                            </li>
                            <li id="req-number">
                                <i class="fas fa-circle"></i>
                                数字を含む
                            </li>
                            <li id="req-special">
                                <i class="fas fa-circle"></i>
                                特殊文字を含む (!@#$%^&*)
                            </li>
                        </ul>
                    </div>

                    <button type="submit" class="auth-button">
                        <span>パスワードを変更</span>
                        <i class="fas fa-check"></i>
                    </button>
                </form>

                <div class="auth-footer">
                    <p>リセットをキャンセル <a href="login.html">ログインに戻る</a></p>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-visual">
                <div class="visual-content">
                    <h2>もう少しで<br>完了です</h2>
                    <p>新しいパスワードを設定して、<br>アカウントのセキュリティを確保しましょう。</p>
                    <div class="visual-features">
                        <div class="feature-item">
                            <i class="fas fa-shield-alt"></i>
                            <span>強力な暗号化</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-user-lock"></i>
                            <span>安全な保存</span>
                        </div>
                        <div class="feature-item">
                            <i class="fas fa-check-double"></i>
                            <span>二重確認</span>
                        </div>
                    </div>
                </div>
                <div class="visual-decoration">
                    <div class="decoration-circle-1"></div>
                    <div class="decoration-circle-2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 成功モーダル -->
    <div class="modal" id="successModal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon success">
                <i class="fas fa-check-circle"></i>
            </div>
            <h3>パスワードを変更しました</h3>
            <p>新しいパスワードでログインできます。</p>
            <button class="modal-button" onclick="redirectToLogin()">ログインページへ</button>
        </div>
    </div>

    <script src="password-reset.js"></script>

    <style>
        /* パスワードリセット専用スタイル */
        .password-strength {
            margin-top: 0.5rem;
        }

        .strength-bar {
            width: 100%;
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        .strength-fill {
            height: 100%;
            width: 0;
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .strength-fill.weak {
            width: 33%;
            background: #dc3545;
        }

        .strength-fill.medium {
            width: 66%;
            background: #ffc107;
        }

        .strength-fill.strong {
            width: 100%;
            background: #28a745;
        }

        .strength-text {
            font-size: 0.85rem;
            color: #6c757d;
        }

        .strength-text.weak {
            color: #dc3545;
        }

        .strength-text.medium {
            color: #ffc107;
        }

        .strength-text.strong {
            color: #28a745;
        }

        .password-requirements {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1.5rem;
        }

        .password-requirements h4 {
            margin: 0 0 0.75rem 0;
            color: var(--dark-gray);
            font-size: 0.9rem;
        }

        .password-requirements ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .password-requirements li {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: #6c757d;
        }

        .password-requirements li:last-child {
            margin-bottom: 0;
        }

        .password-requirements li i {
            font-size: 0.6rem;
            color: #e9ecef;
        }

        .password-requirements li.valid {
            color: #28a745;
        }

        .password-requirements li.valid i {
            color: #28a745;
        }

        .error-message {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: block;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-message.show {
            opacity: 1;
        }

        .toggle-password {
            cursor: pointer;
            color: #6c757d;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: var(--primary-blue);
        }

        /* モーダル */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: modalAppear 0.3s ease-out;
        }

        @keyframes modalAppear {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
        }

        .modal-icon.success {
            background: #d4edda;
            color: #28a745;
        }

        .modal-content h3 {
            color: var(--primary-blue);
            margin-bottom: 1rem;
            font-size: 1.5rem;
        }

        .modal-content p {
            color: var(--gray-text);
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .modal-button {
            background: var(--primary-blue);
            color: var(--white);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 25px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1.5rem;
        }

        .modal-button:hover {
            background: var(--secondary-blue);
            transform: translateY(-2px);
        }
    </style>
</body>
</html>
